<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin JAGB</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; }
        .topbar { background: #1a1a1a; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .container { max-width: 950px; margin: 20px auto; background: white; padding: 25px; border-radius: 12px; }
        .stats { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #fff5eb; padding: 20px; flex: 1; border-radius: 8px; text-align: center; border-left: 5px solid #ff8000; }
        .stat-card span { font-size: 24px; font-weight: bold; color: #ff8000; display: block; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { background: #ff8000; color: white; border: none; font-weight: bold; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: left; }
        .btn-delete { background: #ff4d4d; width: auto; padding: 6px 10px; font-size: 11px; }
        .btn-edit { background: #007bff; width: auto; padding: 6px 10px; font-size: 11px; margin-right: 5px; }
        #editSection { display: none; background: #eefbff; padding: 20px; border-radius: 8px; border: 2px solid #007bff; margin-bottom: 30px; }
    </style>
</head>
<body>
    <div class="topbar">
        <h1>Dashboard JAGB Store</h1>
        <a href="/" style="color:white;text-decoration:none;font-weight:bold;">Retour Boutique</a>
    </div>

    <div class="container">
        <div class="stats">
            <div class="stat-card"><p>Produits</p><span id="stat-p">0</span></div>
            <div class="stat-card"><p>Commandes</p><span id="stat-c">0</span></div>
        </div>

        <div id="editSection">
            <h3>Modifier le Produit</h3>
            <input type="hidden" id="editId">
            <input type="text" id="editName" placeholder="Nom">
            <input type="number" id="editPrice" placeholder="Prix">
            <select id="editCategory">
                <option value="Maillots">Maillots</option>
                <option value="Gants">Gants</option>
                <option value="Equipements">Equipements</option>
            </select>
            <input type="file" id="editImageFile" accept="image/*">
            <button onclick="saveEdit()" style="background:#28a745;">ENREGISTRER</button>
            <button onclick="hideEdit()" style="background:#666;">ANNULER</button>
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:30px;">
            <form id="productForm">
                <h3>Ajouter un Produit</h3>
                <input type="text" id="name" placeholder="Nom" required>
                <input type="number" id="price" placeholder="Prix" required>
                <select id="category">
                    <option value="Maillots">Maillots</option>
                    <option value="Gants">Gants</option>
                    <option value="Equipements">Equipements</option>
                </select>
                <input type="file" id="imageFile" accept="image/*">
                <button type="submit">PUBLIER</button>
            </form>

            <div>
                <h3>Inventaire</h3>
                <table id="productTable">
                    <thead><tr><th>Produit</th><th>Prix</th><th>Actions</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function loadData() {
            const resP = await fetch('/api/products');
            const products = await resP.json();
            document.getElementById('stat-p').innerText = products.length;
            const tbody = document.querySelector('#productTable tbody');
            tbody.innerHTML = products.map(p => `
                <tr>
                    <td>${p.name}</td>
                    <td>${p.price} HTG</td>
                    <td>
                        <button onclick="showEdit('${p._id}', '${p.name}', ${p.price}, '${p.category}')" class="btn-edit">Modif</button>
                        <button onclick="deleteP('${p._id}')" class="btn-delete">X</button>
                    </td>
                </tr>
            `).join('');
        }

        document.getElementById('productForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('name', document.getElementById('name').value);
            formData.append('price', document.getElementById('price').value);
            formData.append('category', document.getElementById('category').value);
            const file = document.getElementById('imageFile').files[0];
            if(file) formData.append('imageFile', file);
            await fetch('/api/products', { method: 'POST', body: formData });
            location.reload();
        };

        function showEdit(id, nom, prix, cat) {
            document.getElementById('editSection').style.display = 'block';
            document.getElementById('editId').value = id;
            document.getElementById('editName').value = nom;
            document.getElementById('editPrice').value = prix;
            document.getElementById('editCategory').value = cat;
        }

        function hideEdit() { document.getElementById('editSection').style.display = 'none'; }

        async function saveEdit() {
            const id = document.getElementById('editId').value;
            const formData = new FormData();
            formData.append('name', document.getElementById('editName').value);
            formData.append('price', document.getElementById('editPrice').value);
            formData.append('category', document.getElementById('editCategory').value);
            const file = document.getElementById('editImageFile').files[0];
            if(file) formData.append('imageFile', file);

            const res = await fetch(/api/products/${id}, { method: 'PUT', body: formData });
            if (res.ok) location.reload();
        }

        async function deleteP(id) {
            if (confirm('Supprimer ?')) {
                await fetch('/api/products/' + id, { method: 'DELETE' });
                loadData();
            }
        }
        loadData();
    </script>
</body>
</html>
