<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin JAGB - Gestion de la Boutique</title>
    <!-- Le lien vers le CSS doit être relatif pour Render -->
    <link rel="stylesheet" href="/style.css">
    <style>
        /* Styles de secours au cas où le fichier CSS met du temps à charger */
        body { font-family: 'Poppins', sans-serif; background: #f4f4f4; margin: 0; color: #333; }
        .topbar { background: #1a1a1a; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .container { max-width: 1000px; margin: 20px auto; background: white; padding: 25px; border-radius: 12px; shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .stats { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #fff5eb; padding: 20px; flex: 1; border-radius: 8px; text-align: center; border-left: 5px solid #ff8000; }
        .stat-card span { font-size: 24px; font-weight: bold; color: #ff8000; display: block; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { background: #ff8000; color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #e67300; }
        table { width: 100%; border-collapse: collapse; margin-top: 25px; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: left; }
        th { background: #f9f9f9; color: #666; }
        .btn-delete { background: #ff4d4d; padding: 6px 12px; font-size: 12px; width: auto; }
    </style>
</head>
<body>

    <div class="topbar">
        <h1>Dashboard JAGB Store</h1>
        <a href="/" style="color: white; text-decoration: none; font-weight: bold;">← Retour Boutique</a>
    </div>

    <div class="container">
        <!-- Section Statistiques -->
        <div class="stats">
            <div class="stat-card">
                <p>🛒 Produits en ligne</p>
                <span id="stat-p">0</span>
            </div>
            <div class="stat-card">
                <p>📦 Commandes reçues</p>
                <span id="stat-c">0</span>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px;">
            <!-- Formulaire d'ajout -->
            <div>
                <h3>Ajouter un Nouveau Produit</h3>
                <form id="productForm">
                    <label>Nom du produit</label>
                    <input type="text" id="name" placeholder="Ex: Maillot Officiel JAGB" required>
                    
                    <label>Prix (HTG)</label>
                    <input type="number" id="price" placeholder="Ex: 2500" required>
                    
                    <label>Catégorie</label>
                    <select id="category">
                        <option value="Maillots">Maillots</option>
                        <option value="Gants">Gants</option>
                        <option value="Équipements">Équipements</option>
                        <option value="Accessoires">Accessoires</option>
                    </select>
                    
                    <label>Lien de l'image (URL)</label>
                    <input type="text" id="image" placeholder="https://lien-image.jpg">
                    
                    <button type="submit">📦 ENREGISTRER DANS LA BOUTIQUE</button>
                </form>
            </div>

            <!-- Liste des produits -->
            <div>
                <h3>Inventaire Actuel</h3>
                <div style="max-height: 400px; overflow-y: auto;">
                    <table id="productTable">
                        <thead>
                            <tr>
                                <th>Produit</th>
                                <th>Prix</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Les produits s'afficheront ici -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Fonction pour charger les données depuis l'API de ton serveur
        async function loadData() {
            try {
                // Chargement des produits
                const resP = await fetch('/api/products');
                const products = await resP.json();
                
                // Chargement du rapport global (commandes)
                const resR = await fetch('/api/admin/rapport');
                const rapport = await resR.json();

                // Mise à jour des compteurs
                document.getElementById('stat-p').innerText = products.length;
                document.getElementById('stat-c').innerText = rapport.commandes ? rapport.commandes.length : 0;

                // Affichage dans le tableau
                const tbody = document.querySelector('#productTable tbody');
                tbody.innerHTML = products.map(p => `
                    <tr>
                        <td style="font-weight:bold;">${p.name}</td>
                        <td>${p.price} HTG</td>
                        <td>
                            <button onclick="deleteP('${p._id}')" class="btn-delete">Supprimer</button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error("Erreur de chargement :", error);
            }
        }

        // Gestion de l'envoi du formulaire
        document.getElementById('productForm').onsubmit = async (e) => {
            e.preventDefault();
            
            const productData = {
                name: document.getElementById('name').value,
                price: Number(document.getElementById('price').value),
                category: document.getElementById('category').value,
                image: document.getElementById('image').value || 'https://via.placeholder.com/300'
            };
            
            const response = await fetch('/api/products', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(productData)
            });

            if(response.ok) {
                alert("Produit ajouté avec succès !");
                loadData(); // Rafraîchir la liste
                e.target.reset(); // Vider le formulaire
            } else {
                alert("Erreur lors de l'ajout.");
            }
        };

        // Fonction pour supprimer un produit
        async function deleteP(id) {
            if(confirm("Voulez-vous vraiment retirer ce produit de la vente ?")) {
                const response = await fetch(`/api/products/${id}`, { method: 'DELETE' });
                if(response.ok) {
                    loadData();
                }
            }
        }

        // Lancement au chargement de la page
        loadData();
    </script>
</body>
</html>
