<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Admin JAGB - Gestion</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; }
        .topbar { background: #1a1a1a; color: white; padding: 15px; display: flex; justify-content: space-between; }
        .container { max-width: 900px; margin: 20px auto; background: white; padding: 20px; border-radius: 8px; }
        input, select, button { width: 100%; padding: 10px; margin: 5px 0; }
        button { background: #ff8000; color: white; border: none; font-weight: bold; cursor: pointer; }
        .stats { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat-card { background: #eee; padding: 15px; flex: 1; border-radius: 5px; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
    </style>
</head>
<body>
    <div class="topbar">
        <h1>Dashboard JAGB</h1>
        <a href="/" style="color: white;">Voir la boutique</a>
    </div>

    <div class="container">
        <div class="stats">
            <div class="stat-card">🛒 Produits: <span id="stat-p">0</span></div>
            <div class="stat-card">📦 Commandes: <span id="stat-c">0</span></div>
        </div>

        <h3>Ajouter un Produit</h3>
        <form id="productForm">
            <input type="text" id="name" placeholder="Nom du produit (ex: Maillot JAGB)" required>
            <input type="number" id="price" placeholder="Prix (HTG)" required>
            <input type="text" id="category" placeholder="Catégorie (Gants, Maillot...)" required>
            <input type="text" id="image" placeholder="Lien de l'image">
            <button type="submit">ENREGISTRER LE PRODUIT</button>
        </form>

        <h3>Liste des Produits</h3>
        <table id="productTable">
            <thead><tr><th>Nom</th><th>Prix</th><th>Action</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        async function loadData() {
            const resP = await fetch('/api/products');
            const products = await resP.json();
            
            const resR = await fetch('/api/admin/rapport');
            const rapport = await resR.json();

            document.getElementById('stat-p').innerText = products.length;
            document.getElementById('stat-c').innerText = rapport.commandes.length;

            const tbody = document.querySelector('#productTable tbody');
            tbody.innerHTML = products.map(p => `
                <tr>
                    <td>${p.name}</td>
                    <td>${p.price} HTG</td>
                    <td><button onclick="deleteP('${p._id}')" style="background:red; padding:5px;">X</button></td>
                </tr>
            `).join('');
        }

        document.getElementById('productForm').onsubmit = async (e) => {
            e.preventDefault();
            const p = {
                name: document.getElementById('name').value,
                price: document.getElementById('price').value,
                category: document.getElementById('category').value,
                image: document.getElementById('image').value || 'https://via.placeholder.com/300'
            };
            await fetch('/api/products', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(p)
            });
            loadData();
            e.target.reset();
        };

        async function deleteP(id) {
            if(confirm("Supprimer ?")) {
                await fetch(`/api/products/${id}`, { method: 'DELETE' });
                loadData();
            }
        }

        loadData();
    </script>
</body>
</html>
