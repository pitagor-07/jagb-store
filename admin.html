<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Admin - JAGB Store</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .form-group { margin-bottom: 15px; background: #eee; padding: 15px; border-radius: 8px; }
        input, select, button { display: block; width: 100%; margin-top: 5px; padding: 10px; }
        button { cursor: pointer; border: none; border-radius: 5px; font-weight: bold; }
        .btn-add { background: #ff8000; color: white; }
        .product-item { display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #ccc; padding: 10px 0; }
        .product-item img { width: 50px; height: 50px; object-fit: cover; }
        #editFormContainer { display:none; background: #fff3e0; padding: 20px; border: 2px solid #ff8000; margin-bottom: 20px; }
    </style>
</head>
<body>

    <h1>Panneau d'Administration</h1>

    <div id="editFormContainer">
        <h3>Modifier le produit</h3>
        <input type="hidden" id="editId">
        <input type="text" id="editNom" placeholder="Nom">
        <input type="number" id="editPrix" placeholder="Prix">
        <select id="editCategorie">
            <option value="Maillots">Maillots</option>
            <option value="Equipements">Équipements</option>
            <option value="Accessoires">Accessoires</option>
        </select>
        <label>Changer la photo :</label>
        <input type="file" id="editImageFile" accept="image/*">
        <button onclick="sauvegarderModification()" style="background: #28a745; color: white; margin-top:10px;">ENREGISTRER</button>
        <button onclick="annulerModification()" style="background: #666; color: white;">ANNULER</button>
    </div>

    <div class="form-group">
        <h3>Ajouter un nouveau produit</h3>
        <input type="text" id="nom" placeholder="Nom du produit">
        <input type="number" id="prix" placeholder="Prix">
        <select id="categorie">
            <option value="Maillots">Maillots</option>
            <option value="Equipements">Équipements</option>
            <option value="Accessoires">Accessoires</option>
        </select>
        <label>Photo du produit :</label>
        <input type="file" id="imageFile" accept="image/*">
        <button class="btn-add" onclick="ajouterProduit()">AJOUTER LE PRODUIT</button>
    </div>

    <hr>
    <h2>Liste des Produits</h2>
    <div id="listeProduits"></div>

    <script>
        async function chargerProduits() {
            const res = await fetch('/api/products');
            const produits = await res.json();
            const container = document.getElementById('listeProduits');
            container.innerHTML = '';
            produits.forEach(p => {
                container.innerHTML += `
                    <div class="product-item">
                        <img src="${p.image}" alt="">
                        <div>
                            <strong>${p.name}</strong> - ${p.price} HTG
                        </div>
                        <div>
                            <button onclick="preparerModification('${p._id}', '${p.name}', ${p.price}, '${p.category}')" style="background:#007bff; color:white;">Modifier</button>
                            <button onclick="supprimerProduit('${p._id}')" style="background:#dc3545; color:white;">Supprimer</button>
                        </div>
                    </div>`;
            });
        }

        async function ajouterProduit() {
            const formData = new FormData();
            formData.append('name', document.getElementById('nom').value);
            formData.append('price', document.getElementById('prix').value);
            formData.append('category', document.getElementById('categorie').value);
            
            const fileInput = document.getElementById('imageFile');
            if (fileInput.files[0]) formData.append('imageFile', fileInput.files[0]);

            const res = await fetch('/api/products', { method: 'POST', body: formData });
            if (res.ok) location.reload();
        }

        function preparerModification(id, nom, prix, categorie) {
            document.getElementById('editFormContainer').style.display = 'block';
            document.getElementById('editId').value = id;
            document.getElementById('editNom').value = nom;
            document.getElementById('editPrix').value = prix;
            document.getElementById('editCategorie').value = categorie;
            window.scrollTo(0, 0);
        }

        async function sauvegarderModification() {
            const id = document.getElementById('editId').value;
            const formData = new FormData();
            formData.append('name', document.getElementById('editNom').value);
            formData.append('price', document.getElementById('editPrix').value);
            formData.append('category', document.getElementById('editCategorie').value);

            const fileInput = document.getElementById('editImageFile');
            if (fileInput.files[0]) formData.append('imageFile', fileInput.files[0]);

            const res = await fetch(/api/products/${id}, { method: 'PUT', body: formData });
            if (res.ok) location.reload();
        }

        function annulerModification() {
            document.getElementById('editFormContainer').style.display = 'none';
        }

        async function supprimerProduit(id) {
            if (confirm("Supprimer ce produit ?")) {
                await fetch(/api/products/${id}, { method: 'DELETE' });
                chargerProduits();
            }
        }

        chargerProduits();
    </script>
</body>
</html>
